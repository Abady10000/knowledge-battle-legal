<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>تغيير كلمة المرور — نزال المعرفة</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(180deg, #1A1B3D 0%, #16213E 50%, #0F1123 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    color: #fff;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(231,178,76,0.25);
    border-radius: 20px;
    padding: 32px 28px;
    text-align: center;
  }

  .logo {
    font-size: 40px;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 20px;
    font-weight: 800;
    color: #F5D07A;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    margin-bottom: 28px;
    line-height: 1.6;
  }

  .field {
    text-align: right;
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    margin-bottom: 6px;
  }

  input[type="password"] {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid rgba(231,178,76,0.3);
    background: rgba(255,255,255,0.06);
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    text-align: right;
    direction: ltr;
    outline: none;
  }

  input[type="password"]:focus {
    border-color: #E7B24C;
  }

  input[type="password"]::placeholder {
    color: rgba(255,255,255,0.25);
    font-family: 'Cairo', sans-serif;
  }

  .btn {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(90deg, #E7B24C, #C8941F);
    color: #1A1B3D;
    font-family: 'Cairo', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .btn:not(:disabled):active {
    opacity: 0.85;
  }

  .message {
    margin-top: 18px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
  }

  .message.show {
    display: block;
  }

  .message.error {
    background: rgba(220,53,69,0.12);
    border: 1px solid rgba(220,53,69,0.3);
    color: #ff8a94;
  }

  .message.success {
    background: rgba(76,175,80,0.12);
    border: 1px solid rgba(76,175,80,0.3);
    color: #8fd694;
  }

  .hint {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    margin-top: 18px;
    line-height: 1.6;
  }

  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(26,27,61,0.3);
    border-top-color: #1A1B3D;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-left: 8px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .success-icon {
    font-size: 48px;
    margin-bottom: 12px;
  }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="logo">🛡️</div>
  <h1>تغيير كلمة المرور</h1>
  <p class="subtitle" id="subtitle">اضغط الزر أدناه لمتابعة تغيير كلمة المرور</p>

  <div id="confirmSection">
    <button class="btn" id="confirmBtn" onclick="startVerification()">متابعة لتغيير كلمة المرور</button>
  </div>

  <div id="formSection" style="display: none;">
    <div class="field">
      <label for="newPassword">كلمة المرور الجديدة</label>
      <input type="password" id="newPassword" placeholder="6 أحرف على الأقل" autocomplete="new-password">
    </div>
    <div class="field">
      <label for="confirmPassword">تأكيد كلمة المرور</label>
      <input type="password" id="confirmPassword" placeholder="أعد كتابة كلمة المرور" autocomplete="new-password">
    </div>
    <button class="btn" id="submitBtn" onclick="handleSubmit()">حفظ كلمة المرور الجديدة</button>
  </div>

  <div class="message" id="message"></div>

  <p class="hint" id="hint" style="display: none;">بعد الحفظ، ارجع لتطبيق نزال المعرفة وسجّل الدخول بكلمة المرور الجديدة</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://ynazydihugtrlrclqyrh.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluYXp5ZGlodWd0cmxyY2xxeXJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5OTk2NTYsImV4cCI6MjA5ODU3NTY1Nn0.GHVYmLpMktE6FlOp3BegWo0KzFCTuevRSOHa4W6r22E';

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      // ── معطّل عمداً عند التحميل: نمنع أي معالجة تلقائية للرابط حتى
      // لا تستهلك فحوصات الأمان الآلية (مثل Gmail Safe Browsing التي
      // تفتح الروابط تلقائياً بالخلفية فور وصول الإيميل) رمز التحقق
      // ذا الاستخدام الواحد قبل وصول المستخدم الحقيقي. يُفعَّل يدوياً
      // فقط بعد ضغطة "متابعة" الصريحة عبر startVerification() ──
      detectSessionInUrl: false,
      flowType: 'pkce',
    },
  });

  const messageEl = document.getElementById('message');
  const submitBtn = document.getElementById('submitBtn');
  const formSection = document.getElementById('formSection');
  const subtitleEl = document.getElementById('subtitle');
  const hintEl = document.getElementById('hint');

  function showMessage(text, type) {
    messageEl.textContent = text;
    messageEl.className = 'message show ' + type;
  }

  function setLoading(loading) {
    submitBtn.disabled = loading;
    submitBtn.innerHTML = loading
      ? '<span class="spinner"></span>جارٍ الحفظ...'
      : 'حفظ كلمة المرور الجديدة';
  }

  async function handleSubmit() {
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (newPassword.length < 6) {
      showMessage('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
      return;
    }
    if (newPassword !== confirmPassword) {
      showMessage('كلمتا المرور غير متطابقتين', 'error');
      return;
    }

    setLoading(true);
    messageEl.className = 'message';

    try {
      const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
      if (error) throw error;

      formSection.style.display = 'none';
      subtitleEl.style.display = 'none';
      hintEl.textContent = 'يمكنك الآن الرجوع لتطبيق نزال المعرفة وتسجيل الدخول بكلمة المرور الجديدة.';

      const card = document.getElementById('card');
      const successIcon = document.createElement('div');
      successIcon.className = 'success-icon';
      successIcon.textContent = '✅';
      card.insertBefore(successIcon, document.getElementById('message'));

      showMessage('تم تغيير كلمة المرور بنجاح!', 'success');
    } catch (err) {
      setLoading(false);
      showMessage(err.message === 'Auth session missing!'
        ? 'انتهت صلاحية الرابط أو تم استخدامه من قبل. أرسل رابطاً جديداً من التطبيق.'
        : 'تعذّر تغيير كلمة المرور: ' + (err.message || 'خطأ غير متوقع'), 'error');
    }
  }

  const confirmSection = document.getElementById('confirmSection');
  const confirmBtn = document.getElementById('confirmBtn');

  // ── يُستدعى فقط عند ضغطة يدوية فعلية من المستخدم على "متابعة" —
  // هذا التأخير المتعمد لأي معالجة للرابط هو ما يحمي التوكن ذا
  // الاستخدام الواحد من فحوصات الأمان الآلية (Gmail Safe Browsing
  // وغيرها) التي تفتح الروابط تلقائياً بالخلفية فور وصول الإيميل،
  // دون أن تضغط أي أزرار داخل الصفحة نفسها ──
  async function startVerification() {
    confirmBtn.disabled = true;
    confirmBtn.textContent = 'جارٍ التحقق...';
    subtitleEl.textContent = 'جارٍ التحقق من الرابط...';

    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const hashParams = new URLSearchParams(window.location.hash.replace('#', ''));
    const errorCode = urlParams.get('error_code') || hashParams.get('error_code');

    if (errorCode) {
      showFailure();
      return;
    }

    if (!code) {
      showFailure();
      return;
    }

    try {
      const { error } = await supabaseClient.auth.exchangeCodeForSession(code);
      if (error) throw error;

      confirmSection.style.display = 'none';
      formSection.style.display = 'block';
      subtitleEl.textContent = 'أدخل كلمة المرور الجديدة لحسابك في نزال المعرفة';
      hintEl.style.display = 'block';
    } catch (err) {
      showFailure();
    }
  }

  function showFailure() {
    confirmSection.style.display = 'none';
    subtitleEl.textContent = '';
    showMessage('هذا الرابط غير صالح أو انتهت صلاحيته. أرسل رابطاً جديداً من التطبيق.', 'error');
  }
</script>

</body>
</html>
